<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Справочная система</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1, h2 { color: #333; }
        .info { font-size: 0.9em; color: #555; margin-bottom: 20px; }
        select, button { padding: 5px 10px; margin-right: 10px; }
        table { border-collapse: collapse; width: 100%; margin-top: 15px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background-color: #f4f4f4; cursor: pointer; user-select: none; }
        th:hover { background-color: #e0e0e0; }
        .hidden { display: none; }
        #form-container {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #aaa;
            background: #fafafa;
            max-width: 500px;
        }
        #form-container label { display: block; margin: 10px 0 5px; }
        #form-container input, #form-container select, #form-container textarea {
            width: 100%;
            padding: 5px;
            box-sizing: border-box;
        }
        .action-btns { margin-top: 15px; }
        .error { color: red; }
    </style>
</head>
<body>

    <label for="table-select">Выберите справочник:</label>
    <select id="table-select"></select>
    <button id="add-btn">Добавить запись</button>

    <table id="data-table">
        <thead></thead>
        <tbody></tbody>
    </table>

    <div id="form-container" class="hidden">
        <h2 id="form-title">Добавление</h2>
        <div id="form-fields"></div>
        <div class="action-btns">
            <button id="save-btn">Сохранить</button>
            <button id="cancel-btn">Отмена</button>
        </div>
        <div id="form-error" class="error"></div>
    </div>

    <script>
        let currentTable = '';
        let currentMeta = null;   
        let sortCol = 'id';
        let sortOrder = 'asc';
        let editingId = null;

        document.addEventListener('DOMContentLoaded', async () => {
            await loadTableList();
            document.getElementById('table-select').addEventListener('change', async (e) => {
                currentTable = e.target.value;
                sortCol = 'id';
                sortOrder = 'asc';
                await loadMeta();
                loadTable();
            });
            document.getElementById('add-btn').addEventListener('click', () => openForm());
            document.getElementById('save-btn').addEventListener('click', saveRecord);
            document.getElementById('cancel-btn').addEventListener('click', closeForm);
        });

        async function loadTableList() {
            const resp = await fetch('/api/tables');
            const tables = await resp.json();
            const select = document.getElementById('table-select');
            select.innerHTML = tables.map(t => `<option value="${t}">${t}</option>`).join('');
            if (tables.length > 0) {
                currentTable = tables[0];
                await loadMeta();
                loadTable();
            }
        }

        async function loadMeta() {
            const resp = await fetch(`/api/${currentTable}/meta`);
            const data = await resp.json();
            currentMeta = data.columns;
        }

        async function loadTable() {
            if (!currentTable) return;
            const response = await fetch(`/api/${currentTable}?sort=${sortCol}&order=${sortOrder}`);
            const data = await response.json();
            renderTable(data.columns, data.rows);
        }

        function renderTable(columns, rows) {
            const thead = document.querySelector('#data-table thead');
            const tbody = document.querySelector('#data-table tbody');
            thead.innerHTML = '';
            tbody.innerHTML = '';

            const tr = document.createElement('tr');
            columns.forEach(col => {
                if (col === 'id') return;
                const th = document.createElement('th');
                th.textContent = col;
                th.dataset.column = col;
                th.addEventListener('click', () => {
                    if (sortCol === col) {
                        sortOrder = sortOrder === 'asc' ? 'desc' : 'asc';
                    } else {
                        sortCol = col;
                        sortOrder = 'asc';
                    }
                    loadTable();
                });
                tr.appendChild(th);
            });
            const thAction = document.createElement('th');
            thAction.textContent = 'Действия';
            tr.appendChild(thAction);
            thead.appendChild(tr);

            rows.forEach(row => {
                const tr = document.createElement('tr');
                columns.forEach(col => {
                    if (col === 'id') return;
                    const td = document.createElement('td');
                    let val = row[col];

                    const metaCol = currentMeta?.find(m => m.name === col);
                    if (metaCol && metaCol.fk && val !== null) {
                        fetch(`/api/${metaCol.fk.table}/${val}`)
                            .then(res => res.json())
                            .then(fkRow => {
                                const displayField = Object.keys(fkRow).find(k => k !== 'id') || 'id';
                                td.textContent = fkRow[displayField] ?? val;
                            })
                            .catch(() => { td.textContent = val; });
                    } else if ((col.includes('date') || col.includes('Date')) && val) {
                        const parts = val.split('-');
                        if (parts.length === 3) {
                            val = `${parts[2]}.${parts[1]}.${parts[0]}`;
                        }
                    }
                    td.textContent = val !== null ? val : '';
                    tr.appendChild(td);
                });

                const tdAction = document.createElement('td');
                const editBtn = document.createElement('button');
                editBtn.textContent = '✎';
                editBtn.addEventListener('click', () => openForm(row.id));
                const delBtn = document.createElement('button');
                delBtn.textContent = '✕';
                delBtn.addEventListener('click', () => deleteRecord(row.id));
                tdAction.appendChild(editBtn);
                tdAction.appendChild(delBtn);
                tr.appendChild(tdAction);
                tbody.appendChild(tr);
            });
        }

        async function openForm(id = null) {
            editingId = id;
            document.getElementById('form-container').classList.remove('hidden');
            document.getElementById('form-error').textContent = '';

            if (id) {
                document.getElementById('form-title').textContent = 'Редактирование';
                const resp = await fetch(`/api/${currentTable}/${id}`);
                if (!resp.ok) { alert('Ошибка загрузки записи'); return; }
                const record = await resp.json();
                buildForm(record);
            } else {
                document.getElementById('form-title').textContent = 'Добавление';
                buildForm({});
            }
        }

        async function buildForm(data = {}) {
            if (!currentMeta) return;
            const container = document.getElementById('form-fields');
            container.innerHTML = '';

            for (const col of currentMeta) {
                if (col.pk && col.name === 'id') continue; 

                const label = document.createElement('label');
                label.textContent = col.name + ':';
                container.appendChild(label);

                let input;

                if (col.fk) {
                    input = document.createElement('select');
                    input.id = col.name;
                    try {
                        const resp = await fetch(`/api/${col.fk.table}`);
                        const fkData = await resp.json();
                        const displayField = fkData.columns.find(c => c !== 'id') || 'id';
                        input.innerHTML = '<option value="">-- не выбран --</option>';
                        fkData.rows.forEach(row => {
                            const option = document.createElement('option');
                            option.value = row.id;
                            option.textContent = row[displayField];
                            if (row.id == data[col.name]) option.selected = true;
                            input.appendChild(option);
                        });
                    } catch (e) {
                        input.innerHTML = '<option value="">Ошибка загрузки</option>';
                    }
                } else if (col.type === 'TEXT' || col.name === 'description') {
                    input = document.createElement('textarea');
                    input.id = col.name;
                    input.rows = 4;
                } else if (col.type === 'INTEGER' || col.type === 'INT') {
                    input = document.createElement('input');
                    input.type = 'number';
                    input.id = col.name;
                    input.step = '1';
                } else if (col.type === 'REAL' || col.type === 'FLOAT' || col.type === 'NUMERIC') {
                    input = document.createElement('input');
                    input.type = 'number';
                    input.id = col.name;
                    input.step = '0.01';
                } else if (col.type === 'DATE' || col.name.toLowerCase().includes('date')) {
                    input = document.createElement('input');
                    input.type = 'date';
                    input.id = col.name;
                } else {
                    input = document.createElement('input');
                    input.type = 'text';
                    input.id = col.name;
                }

                if (input) {
                    if (data[col.name] !== undefined && data[col.name] !== null) {
                        if (input.type === 'date') {
                            input.value = data[col.name].toString().substring(0, 10);
                        } else if (input.tagName === 'SELECT') {
                        } else if (input.tagName === 'TEXTAREA') {
                            input.value = data[col.name];
                        } else {
                            input.value = data[col.name];
                        }
                    }
                    container.appendChild(input);
                    container.appendChild(document.createElement('br'));
                }
            }
        }

        async function saveRecord() {
            document.getElementById('form-error').textContent = '';
            const data = {};
            const fields = document.querySelectorAll('#form-fields input, #form-fields select, #form-fields textarea');

            fields.forEach(field => {
                if (field.id) {
                    let value = field.value;
                    if (field.type === 'number') {
                        value = value === '' ? null : parseFloat(value);
                    } else if (field.tagName === 'SELECT') {
                        value = value === '' ? null : parseInt(value);
                    }
                    data[field.id] = value;
                }
            });

            const url = editingId ? `/api/${currentTable}/${editingId}` : `/api/${currentTable}`;
            const method = editingId ? 'PUT' : 'POST';

            try {
                const resp = await fetch(url, {
                    method: method,
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                if (resp.ok) {
                    closeForm();
                    loadTable();
                } else {
                    const err = await resp.json();
                    document.getElementById('form-error').textContent = err.error || 'Ошибка сохранения';
                }
            } catch (error) {
                document.getElementById('form-error').textContent = 'Сетевая ошибка';
            }
        }

        function closeForm() {
            document.getElementById('form-container').classList.add('hidden');
        }

        async function deleteRecord(id) {
            if (!confirm('Удалить запись?')) return;
            const resp = await fetch(`/api/${currentTable}/${id}`, { method: 'DELETE' });
            if (resp.ok) {
                loadTable();
            } else {
                const err = await resp.json();
                alert(err.error || 'Ошибка удаления');
            }
        }
    </script>
</body>
</html>
